 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservations</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-4">Reservations</h1>

<form id="form" class="bg-white p-4 rounded shadow space-y-3">

<input id="resourceId" type="number" placeholder="Resource ID" class="w-full border p-2">
<input id="userId" type="number" placeholder="User ID" class="w-full border p-2">

<input id="startTime" type="datetime-local" class="w-full border p-2">
<input id="endTime" type="datetime-local" class="w-full border p-2">

<input id="note" type="text" placeholder="Note" class="w-full border p-2">
<input id="status" type="text" value="active" class="w-full border p-2">

<button class="bg-red-600 text-white px-4 py-2 rounded">Save</button>

<p id="msg"></p>
</form>

<div class="bg-white mt-6 p-4 rounded shadow">
<h2 class="font-bold mb-2">List</h2>
<div id="list"></div>
</div>

</div>

<script>

// ✅ AUTH CHECK
const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "/login.html";
}

const form = document.getElementById("form");
const list = document.getElementById("list");
const msg = document.getElementById("msg");

// ✅ LOAD DATA
async function load() {
    const res = await fetch("/api/reservations", {
        headers: {
            Authorization: "Bearer " + token
        }
    });

    const json = await res.json();

    list.innerHTML = "";

    json.data.forEach(r => {

        const row = document.createElement("div");
        row.className = "flex justify-between border p-2 mb-2";

        row.innerHTML = `
            <span>ID: ${r.id} | ${r.note}</span>
            <div>
                <button class="edit text-blue-500 mr-2">Edit</button>
                <button class="del text-red-500">Delete</button>
            </div>
        `;

        // ✅ EDIT
        row.querySelector(".edit").onclick = () => {

            resourceId.value = r.resource_id;
            userId.value = r.user_id;
            note.value = r.note || "";
            status.value = r.status || "active";

            startTime.value = r.start_time ? r.start_time.slice(0,16) : "";
            endTime.value = r.end_time ? r.end_time.slice(0,16) : "";

            // 🔴 IMPORTANT: enable update mode
            form.dataset.id = r.id;

            console.log("Editing ID:", r.id);
        };

        // ✅ DELETE
        row.querySelector(".del").onclick = async () => {
            await fetch("/api/reservations/" + r.id, {
                method: "DELETE",
                headers: {
                    Authorization: "Bearer " + token
                }
            });
            load();
        };

        list.appendChild(row);
    });
}

// ✅ SAVE (CREATE + UPDATE)
form.onsubmit = async (e) => {
    e.preventDefault();

    const data = {
        resourceId: Number(resourceId.value) || 1,
        userId: Number(userId.value) || 1,
        startTime: startTime.value ? new Date(startTime.value).toISOString() : new Date().toISOString(),
        endTime: endTime.value ? new Date(endTime.value).toISOString() : new Date().toISOString(),
        note: note.value,
        status: status.value
    };

    let url = "/api/reservations";
    let method = "POST";

    // 🔴 UPDATE MODE
    if (form.dataset.id) {
        url += "/" + form.dataset.id;
        method = "PUT";
    }

    console.log("METHOD:", method, "URL:", url);

    const res = await fetch(url, {
        method,
        headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token
        },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        msg.innerText = method === "PUT" ? "Updated!" : "Saved!";
        form.reset();
        delete form.dataset.id;
        load();
    } else {
        msg.innerText = "Error!";
    }
};

// INIT
load();

</script>

</body>
</html>
